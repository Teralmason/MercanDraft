<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mercan Draft</title>
    <style>
        :root { 
            --p1: #00f2ff; /* Neon Cyan */
            --p2: #ff0055; /* Neon Pink */
            --bg: #08090b; 
            --gold: #ffcc00; 
            --pitch-green: #111a12;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass: rgba(15, 16, 22, 0.85);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Oswald', 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.07) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 85, 0.07) 0%, transparent 40%);
        }

        /* HEADER */
        .header { 
            height: 6vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            backdrop-filter: blur(10px);
        }
        .header h1 { 
            font-size: 22px; 
            letter-spacing: 12px; 
            margin: 0; 
            font-weight: 900; 
            background: linear-gradient(to right, #fff, var(--gold)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-transform: uppercase;
        }

        /* GAME CONTAINER */
        .game-container { 
            display: flex; 
            height: 94vh; 
            padding: 20px; 
            gap: 25px; 
            justify-content: center; 
            align-items: center; 
        }
        
        .team-side { width: 380px; height: 100%; display: flex; flex-direction: column; gap: 12px; }
        
        /* SAHA TASARIMI */
        .pitch { 
            position: relative; 
            width: 100%; 
            flex-grow: 1; 
            background: var(--pitch-green);
            background-image: repeating-linear-gradient(to bottom, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 80px);
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; 
            box-shadow: inset 0 0 60px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        .pitch::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.1); }
        .pitch::after { content: ''; position: absolute; top: 50%; left: 50%; width: 100px; height: 100px; border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; transform: translate(-50%, -50%); }

        .pitch.active-a { border: 2px solid var(--p1); box-shadow: 0 0 30px rgba(0, 242, 255, 0.15), inset 0 0 60px rgba(0,0,0,0.8); }
        .pitch.active-b { border: 2px solid var(--p2); box-shadow: 0 0 30px rgba(255, 0, 85, 0.15), inset 0 0 60px rgba(0,0,0,0.8); }
        
        /* OYUNCU KARTLARI (ÇERÇEVE FİX) */
        .slot { 
            position: absolute; 
            width: 62px; 
            height: 82px; 
            background: rgba(255,255,255,0.15); /* Boş slotun çerçeve rengi */
            clip-path: polygon(15% 0, 85% 0, 100% 20%, 100% 80%, 50% 100%, 0 80%, 0 20%);
            transform: translate(-50%, -50%); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 11px; 
            color: #fff; 
            z-index: 5;
        }

        /* Boş slotun iç karartması */
        .slot::after {
            content: '';
            position: absolute;
            inset: 1px;
            background: rgba(0,0,0,0.6);
            clip-path: inherit;
            z-index: -1;
        }

        .slot:hover { transform: translate(-50%, -50%) scale(1.1); filter: brightness(1.2); }
        
        /* Dolu slotun çerçeve mantığı */
        .slot.filled { 
            background: var(--gold); /* Altın çerçeve */
            display: flex;
            flex-direction: column; 
            color: white; 
            animation: cardAppear 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }

        .slot.filled::before {
            content: '';
            position: absolute;
            inset: 1.5px; /* Çerçeve kalınlığı */
            background: linear-gradient(145deg, #1a1a1a, #000);
            clip-path: inherit;
            z-index: -1;
        }

        @keyframes cardAppear {
            from { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .slot .p-name { 
            font-size: 8.5px; 
            font-weight: bold; 
            text-align: center; 
            text-transform: uppercase; 
            margin-top: 2px; 
            width: 90%; 
            overflow: hidden; 
            white-space: nowrap; 
            text-overflow: ellipsis;
            text-shadow: 0 1px 2px #000;
        }
        .slot .rtg { font-size: 22px; font-weight: 900; color: var(--gold); line-height: 1; }

        /* YEDEK KULÜBESİ */
        .bench { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; height: 60px; }
        .sub-slot { background: var(--card-bg); border: 1px solid #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; color: #444; }
        .sub-slot.filled { color: white; border-color: var(--gold); font-weight: bold; background: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* MERKEZ PANEL */
        .center-panel { 
            width: 320px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            padding: 30px 20px; 
            background: var(--glass); 
            border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.08); 
            backdrop-filter: blur(15px); 
            height: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        
        .wheel-area { position: relative; width: 260px; height: 260px; }
        #wheel-svg { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); filter: drop-shadow(0 0 20px rgba(0,0,0,0.8)); }
        .needle { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-top: 30px solid var(--gold); z-index: 10; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }
        
        button#spin-btn { 
            background: linear-gradient(135deg, var(--gold) 0%, #cca300 100%); 
            color: black; 
            border: none; 
            padding: 18px; 
            border-radius: 15px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: 900; 
            font-size: 18px; 
            letter-spacing: 2px;
            text-transform: uppercase;
            transform: skewX(-10deg);
        }
        button#spin-btn:hover:not(:disabled) { filter: brightness(1.2); transform: skewX(-10deg) translateY(-2px); box-shadow: 0 10px 20px rgba(255, 204, 0, 0.3); }
        button:disabled { opacity: 0.2; transform: skewX(-10deg) !important; }

        /* MODAL */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1500; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { background: #0e0f13; padding: 40px; border: 1px solid #222; border-radius: 35px; width: 380px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        input { width: 100%; padding: 18px; margin: 25px 0; background: #15171d; border: 1px solid #333; color: white; border-radius: 15px; text-align: center; font-size: 22px; font-family: 'Oswald'; outline: none; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(255, 204, 0, 0.1); }

        #win-overlay { display: none; position: fixed; inset: 0; background: radial-gradient(circle, #1a1a2e, #000); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&display=swap" rel="stylesheet">
</head>

    function clearTxt(str) { return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/ı/g, 'i').replace(/İ/g, 'i').toLowerCase(); }

    function polarToCart(cx, cy, r, a) { const rad = (a - 90) * Math.PI / 180; return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) }; }

    function init() {
        const svg = document.getElementById('wheel-svg');
        const slice = 360 / CLUBS.length;
        CLUBS.forEach((name, i) => {
            const angle = i * slice;
            const p1 = polarToCart(50, 50, 50, angle), p2 = polarToCart(50, 50, 50, angle + slice);
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", `M 50 50 L ${p1.x} ${p1.y} A 50 50 0 0 1 ${p2.x} ${p2.y} Z`);
            path.setAttribute("fill", i % 2 ? "#0e0f13" : "#1a1c22");
            path.setAttribute("stroke", "#333");
            svg.appendChild(path);
            const ta = angle + slice/2, tp = polarToCart(50, 50, 36, ta);
            const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
            txt.setAttribute("x", tp.x); txt.setAttribute("y", tp.y); txt.setAttribute("fill", "#888");
            txt.setAttribute("font-size", "2.8"); txt.setAttribute("text-anchor", "middle"); txt.setAttribute("font-weight", "bold");
            txt.setAttribute("transform", `rotate(${ta + 90}, ${tp.x}, ${tp.y})`);
            txt.textContent = name;
            svg.appendChild(txt);
        });

        ['A', 'B'].forEach(t => {
            const p = document.getElementById(`pitch-${t}`), b = document.getElementById(`bench-${t}`);
            FORM.forEach(pos => {
                const s = document.createElement('div'); s.className = 'slot';
                s.style.left = pos.x + '%'; s.style.top = pos.y + '%'; s.innerText = pos.n;
                s.onclick = () => handleS(t, s, pos.n, pos.t); p.appendChild(s);
            });
            for(let i=1; i<=3; i++){
                const sub = document.createElement('div'); sub.className = 'sub-slot'; sub.innerText = `SUB ${i}`;
                sub.onclick = () => handleS(t, sub, `YEDEK ${i}`, 'ANY'); b.appendChild(sub);
            }
        });
    }

    function spin() {
        document.getElementById('spin-btn').disabled = true;
        rot += Math.floor(Math.random() * 360) + 1800;
        document.getElementById('wheel-svg').style.transform = `rotate(${rot}deg)`;
        setTimeout(() => {
            const stop = (360 - (rot % 360)) % 360;
            selClub = CLUBS[Math.floor(stop / (360 / CLUBS.length))];
            document.getElementById('res-club').innerText = selClub;
        }, 4000);
    }

    function handleS(t, el, pos, type) {
        if (t !== turn || !selClub || el.classList.contains('filled')) return;
        tSlot = el; tType = type;
        document.getElementById('m-club').innerText = selClub;
        document.getElementById('m-pos').innerText = pos;
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('p-input').value = ""; document.getElementById('p-input').focus();
    }

    function confirmP() {
        const val = clearTxt(document.getElementById('p-input').value.trim());
        const found = DB[selClub].find(p => clearTxt(p.n).includes(val));

        if (found) {
            if (usedP.has(found.n)) { alert("Zaten seçildi!"); return; }
            let finalR = found.r;
            if (tType !== 'ANY') {
                if (found.p !== tType) {
                    if ((found.p === 'F' && tType === 'M') || (found.p === 'M' && tType === 'F') || (found.p === 'M' && tType === 'D') || (found.p === 'D' && tType === 'M')) finalR = Math.round(found.r * 0.85);
                    else if (tType === 'G' && found.p !== 'G') finalR = Math.round(found.r * 0.1);
                    else finalR = Math.round(found.r * 0.5);
                }
            }
            tSlot.classList.add('filled');
            tSlot.innerHTML = `<span class="rtg">${finalR}</span><span class="p-name">${found.n}</span>`;
            squads[turn].push({ ...found, finalR });
            usedP.add(found.n);
            closeM();
            next();
        } else { alert("Oyuncu bulunamadı!"); }
    }

    function next() {
        turn = turn === 'A' ? 'B' : 'A';
        const txt = document.getElementById('turn-txt');
        txt.innerText = `${turn} SIRASI!`;
        txt.style.color = turn === 'A' ? 'var(--p1)' : 'var(--p2)';
        document.getElementById('pitch-A').classList.toggle('active-a');
        document.getElementById('pitch-B').classList.toggle('active-b');
        document.getElementById('turn-a-tag').style.opacity = turn === 'A' ? "1" : "0.3";
        document.getElementById('turn-b-tag').style.opacity = turn === 'B' ? "1" : "0.3";
        selClub = ""; document.getElementById('res-club').innerText = "";
        document.getElementById('spin-btn').disabled = false;
        if (usedP.size === 28) finish();
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }

    function finish() {
        const sA = squads.A.reduce((a, b) => a + b.finalR, 0);
        const sB = squads.B.reduce((a, b) => a + b.finalR, 0);
        document.getElementById('win-overlay').style.display = 'flex';
        document.getElementById('win-team').innerText = sA > sB ? "A TAKIMI ŞAMPİYON!" : (sB > sA ? "B TAKIMI ŞAMPİYON!" : "BERABERE!");
        document.getElementById('win-score').innerText = `${sA} - ${sB}`;
    }

    init();
</script>
</body>
</html>
